<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeling Admin - Full Input</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background-color: #f0f2f5; padding: 10px; padding-bottom: 90px; }
        .form-section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #3273dc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section-title { font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; color: #3273dc; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; font-size: 0.6rem; font-weight: bold; text-align: center; color: #888; }
        .grid-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 8px; }
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 100; }
        input.is-small { padding: 5px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <h1 class="title is-5 has-text-centered">FEELING DAILY SYSTEM</h1>

    <form id="mainForm">
        <!-- OPERASIONAL (Dinamis sesuai perbaikan sebelumnya) -->
        <div class="form-section">
            <p class="section-title">INFO OPERASIONAL</p>
            <div class="columns is-mobile is-multiline">
                <div class="column is-6"><label class="label is-size-7">Regional</label>
                    <div class="select is-fullwidth is-small"><select id="reg" onchange="updateSt()"><option>Pilih...</option><option>Banjarbaru</option><option>Banjarmasin</option><option>Martapura</option></select></div>
                </div>
                <div class="column is-6"><label class="label is-size-7">Station</label>
                    <div class="select is-fullwidth is-small"><select id="st"><option>-</option></select></div>
                </div>
                <div class="column is-4"><label class="label is-size-7">Pilot</label><input class="input is-small" type="text" placeholder="Nama"></div>
                <div class="column is-4"><label class="label is-size-7">Office</label><input class="input is-small" type="text" placeholder="Nama"></div>
                <div class="column is-4"><label class="label is-size-7">Kategori</label>
                    <div class="select is-fullwidth is-small"><select id="kat" onchange="toggleSec()"><option>CEK IN</option><option>SD-1</option><option>SD-2</option><option>SD-3</option><option>CEK OUT</option></select></div>
                </div>
            </div>
        </div>

        <!-- SUB LAPORAN PENJUALAN PILOT [A] (image_566675.png) -->
        <div id="sec-a" class="form-section">
            <p class="section-title">PENJUALAN PILOT [A]</p>
            <div class="grid-header"><div>MENU</div><div>CUP CS</div><div>CUP QR</div><div>TML CS</div><div>TML QR</div></div>
            <hr style="margin: 5px 0;">
            <div id="menu-list">
                <!-- Menu akan di-generate via JS -->
            </div>
            
            <p class="is-size-7 mt-3"><strong>ADD ON & PENGELUARAN</strong></p>
            <div class="columns is-mobile is-multiline mt-1">
                <div class="column is-4"><input class="input is-small" type="number" placeholder="Espr A"></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="Espr B"></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="Cup+Ice"></div>
                <div class="column is-6"><input class="input is-small" type="text" placeholder="Item Keluar"></div>
                <div class="column is-6"><input class="input is-small" type="number" placeholder="Nominal Out"></div>
            </div>
        </div>

        <!-- SUB LAPORAN BAHAN BAKU & CUP [B] (image_566650.png) -->
        <div id="sec-b" class="form-section">
            <p class="section-title">BAHAN BAKU & STOCK [B]</p>
            <div class="columns is-mobile is-multiline">
                <div class="column is-4"><label class="label is-size-7">M-GE</label><input class="input is-small" type="number"></div>
                <div class="column is-4"><label class="label is-size-7">M-AR</label><input class="input is-small" type="number"></div>
                <div class="column is-4"><label class="label is-size-7">M-CO</label><input class="input is-small" type="number"></div>
                <div class="column is-4"><label class="label is-size-7">M-MA</label><input class="input is-small" type="number"></div>
                <div class="column is-4"><label class="label is-size-7">M-RE</label><input class="input is-small" type="number"></div>
                <div class="column is-4"><label class="label is-size-7">UHT</label><input class="input is-small" type="number"></div>
                <div class="column is-12"><p class="is-size-7"><strong>SYRUP REQUEST (.Btl / %)</strong></p></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="FL CAR"></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="FL BSC"></div>
                <div class="column is-4"><input class="input is-small" type="number" placeholder="FL IRS"></div>
                <div class="column is-12"><p class="is-size-7"><strong>WASTE STOCK (.Gr)</strong></p></div>
                <div class="column is-6"><input class="input is-small" type="number" placeholder="M-GE S1"></div>
                <div class="column is-6"><input class="input is-small" type="number" placeholder="M-GE S2"></div>
            </div>
        </div>

        <!-- SUB LAPORAN KEUANGAN [C] (image_566614.png) -->
        <div id="sec-c" class="form-section">
            <p class="section-title">LAPORAN KEUANGAN [C]</p>
            <div class="field">
                <label class="label is-size-7">SALDO AWAL KASIR (Office)</label>
                <input class="input is-small" type="number" placeholder="Rp 200.000">
            </div>
            <div class="field">
                <label class="label is-size-7">CASH AKTUAL (Uang di Wallet)</label>
                <input class="input is-small" type="number" placeholder="Rp" style="background-color: #fff9c4;">
            </div>
            <div class="field">
                <label class="label is-size-7">CATATAN / NOTES</label>
                <textarea class="textarea is-small" placeholder="Tambahkan catatan..."></textarea>
            </div>
        </div>

        <div class="sticky-footer">
            <button type="submit" class="button is-primary is-fullwidth">KIRIM KE GOOGLE SHEETS</button>
        </div>
    </form>

    <script>
        const menus = ["OUR FEELING", "BE CAREFEELS", "HAPPY FEALS", "CHOCOFEELS", "GREENFEELS", "RED DEVEELS", "PEACE FUELS", "RUSHFEELS", "NUTFEELS", "VANFEELS", "MOCCAFEELS", "BLACKFEELS"];
        const menuContainer = document.getElementById('menu-list');
        
        menus.forEach(m => {
            const div = document.createElement('div');
            div.className = 'grid-row';
            div.innerHTML = `
                <div style="font-size: 0.65rem;">${m}</div>
                <input class="input is-small" type="number" placeholder="0">
                <input class="input is-small" type="number" placeholder="0">
                <input class="input is-small" type="number" placeholder="0">
                <input class="input is-small" type="number" placeholder="0">
            `;
            menuContainer.appendChild(div);
        });

        function updateSt() {
            const r = document.getElementById('reg').value;
            const s = document.getElementById('st');
            s.innerHTML = "";
            let opts = r === "Banjarbaru" ? ["St 1","St 2","St 3","St 4","St 5","St 6","St 7","St 8","Heritage"] : 
                       r === "Banjarmasin" ? ["St 1","St 2","St 3","St 4","St 5","St 6","St 7","St 8"] : ["St 1","St 2","St 3","St 4","St 5"];
            opts.forEach(o => { let el = document.createElement("option"); el.value=o; el.text=o; s.appendChild(el); });
        }

        function toggleSec() {
            const k = document.getElementById('kat').value;
            document.getElementById('sec-a').style.display = k === "CEK OUT" ? "block" : "none";
            document.getElementById('sec-c').style.display = k === "CEK OUT" ? "block" : "none";
        }
        toggleSec();
    </script>
</body>
</html>
