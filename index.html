<!-- BAGIAN 1: INFO OPERASIONAL (UPDATED) -->
<div class="form-section">
    <p class="section-title">INFO OPERASIONAL</p>
    
    <!-- Row 1: Regional & Station -->
    <div class="columns is-mobile">
        <div class="column">
            <label class="label is-small">Regional</label>
            <div class="select is-fullwidth is-small">
                <select id="regional" onchange="updateStation()">
                    <option value="">Pilih Regional</option>
                    <option value="Banjarbaru">Banjarbaru</option>
                    <option value="Banjarmasin">Banjarmasin</option>
                    <option value="Martapura">Martapura</option>
                </select>
            </div>
        </div>
        <div class="column">
            <label class="label is-small">Station</label>
            <div class="select is-fullwidth is-small">
                <select id="station">
                    <option value="">- Pilih -</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Row 2: Pilot & Office -->
    <div class="columns is-mobile">
        <div class="column">
            <label class="label is-small">Nama Pilot</label>
            <input class="input is-small" type="text" id="pilot" placeholder="Input manual">
        </div>
        <div class="column">
            <label class="label is-small">Staff Office</label>
            <input class="input is-small" type="text" id="office" placeholder="Input manual">
        </div>
    </div>

    <!-- Row 3: Shift & Kategori Input -->
    <div class="columns is-mobile">
        <div class="column">
            <label class="label is-small">Shift</label>
            <div class="select is-fullwidth is-small">
                <select id="shift">
                    <option value="Shift 1">Shift 1</option>
                    <option value="Shift 2">Shift 2</option>
                </select>
            </div>
        </div>
        <div class="column">
            <label class="label is-small">Kategori Input</label>
            <div class="select is-fullwidth is-small">
                <select id="kategori">
                    <option value="CEK IN">CEK IN</option>
                    <option value="SD-1">SD-1</option>
                    <option value="SD-2">SD-2</option>
                    <option value="SD-3">SD-3</option>
                    <option value="CEK OUT">CEK OUT</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script>
function updateStation() {
    const reg = document.getElementById('regional').value;
    const st = document.getElementById('station');
    st.innerHTML = ""; // Reset
    
    let options = [];
    if (reg === "Banjarbaru") {
        options = ["Station 1", "Station 2", "Station 3", "Station 4", "Station 5", "Station 6", "Station 7", "Station 8", "Station Heritage"];
    } else if (reg === "Banjarmasin") {
        options = ["Station 1", "Station 2", "Station 3", "Station 4", "Station 5", "Station 6", "Station 7", "Station 8"];
    } else if (reg === "Martapura") {
        options = ["Station 1", "Station 2", "Station 3", "Station 4", "Station 5"];
    }

    options.forEach(item => {
        let opt = document.createElement("option");
        opt.value = item;
        opt.innerHTML = item;
        st.appendChild(opt);
    });
}
</script>
